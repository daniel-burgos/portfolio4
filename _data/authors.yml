# Change `author1` to your shortname.
author1:
  name:              Daniel Casanova
  email:             dubcasanova@gmail.com

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    My name is Daniel Casanova, and I have a Master's in Curriculum and Instructional Design: Learning Design and Technology from the University of Houston. I am currently an Instructional Designer at the University of Houston College of Global Hospitality and Leadership. I have three years of teaching experience; the first two years I taught math, and the last year before my transition I taught AP Computer Science.
    Throught my professional career I have integrated my personal love for technology into my career. This began during my first year teaching, which was at the height of the pandemic in 2020. I found it somewhat difficult teaching math to my students in an online setting, not to mention the struggles that first year teachers face. I recalled throughout my undergraduate and graduate studies the instructional strategy of flipped classroom. It was apparrent to most of educators that the majority of students do not learn in the most optimal way in an online environment. Hence why I decided to run my class exactly as the way I expenrienced it in college. I began recording videos for my students, hosting everything on blackboard, making my assignments online, and during classtime my students were supposed to do daily rotations so that we could clarify misconceptions in my online lessons.

    Once students returned to a hybrid model, and fully in person, I continued to invest my time into delivering my instruction in an online medium, the only difference was that in person, I would work with students who required the majority of help, and those that were the most autonomous would complete my lecture, and classwork independtly with others. This technology integration expereince is what gave me my desire to continue learning more about technology in the educational setting, hence why I transitioned to teaching AP Computer Science, that and my love for learning.

    During my time teaching AP Computer Science I integrated technology in the most fundamental way that would help hone my students' '21st century skills'. This came in the form of writing emails, collaborating online, communicating with one another, working together on projects, to name a few. By the end of the year, my students were proficient downloading and completing documents online, conducting research, creating static HTML websites, and out of my ten students taking AP Computer Science test, 8/10 scored a three or above, which earns them three college credits. 

    In my current role as an instructional designer, I am integrating everything I have learned throughout my time teaching, which includes video creation, creating templates for the college using HTML/CSS, providing my expertice when aiding professors transition in person activities to Canvas, providing training on making documents and presentations accessible for online use, and guidance integrating instructional design concepts from the Dick and Carey Model of Instructional Design. All of these skills are being integrated in my latest project of helping the College of Global Hospitality and Leadership create an online master's & bachelor's offering to expand the accessbility of education to those unable to physically attend.


